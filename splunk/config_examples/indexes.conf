# indexes.conf — Example index configuration for Splunk Agent Mesh demo data
# Place in $SPLUNK_HOME/etc/system/local/ or your app's default/ directory.
# These indexes should already exist in most security Splunk environments.
# NOT auto-installed by the app.

[endpoint]
homePath   = $SPLUNK_DB/endpoint/db
coldPath   = $SPLUNK_DB/endpoint/colddb
thawedPath = $SPLUNK_DB/endpoint/thaweddb
maxDataSize = auto_high_volume
retention = 90

[dns]
homePath   = $SPLUNK_DB/dns/db
coldPath   = $SPLUNK_DB/dns/colddb
thawedPath = $SPLUNK_DB/dns/thaweddb
retention = 30

[proxy]
homePath   = $SPLUNK_DB/proxy/db
coldPath   = $SPLUNK_DB/proxy/colddb
thawedPath = $SPLUNK_DB/proxy/thaweddb
retention = 30

[firewall]
homePath   = $SPLUNK_DB/firewall/db
coldPath   = $SPLUNK_DB/firewall/colddb
thawedPath = $SPLUNK_DB/firewall/thaweddb
retention = 30
