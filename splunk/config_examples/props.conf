# props.conf — Field extraction examples for Splunk Agent Mesh demo data
# These are illustrative — real props depend on your data sources.
# NOT auto-installed.

[source::...sysmon...]
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TRANSFORMS-sysmon_fields = extract_process_name, extract_parent_process, extract_command_line

[source::stream:dns]
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
KV_MODE = json

[source::stream:http]
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
KV_MODE = json

[source::pan:traffic]
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
KV_MODE = json
