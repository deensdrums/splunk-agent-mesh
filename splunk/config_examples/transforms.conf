# transforms.conf — Lookup definitions for Splunk Agent Mesh demo detections
# Place in app's default/ directory. Lookups must be installed separately.
# NOT auto-installed.

[rare_domains]
filename = rare_domains.csv
case_sensitive_match = false

[suspicious_hosts]
filename = suspicious_hosts.csv
case_sensitive_match = false

[compromised_hosts]
filename = compromised_hosts.csv
case_sensitive_match = false
