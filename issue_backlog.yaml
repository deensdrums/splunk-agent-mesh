stories:

- order: 1
  story_id: DEMO-001
  theme: Judge Demo
  story: Define the supported judge demo runtime
  description: 'Decide and document the environment a judge is expected to run: an existing Splunk instance plus a bootstrap script, or a containerized path. Treat Docker as a decision to validate, not an assumed answer, because a complete Splunk container path introduces licensing, image availability, app installation, port, and token-bootstrap constraints.'
  acceptance_criteria:
  - A short decision record names the supported path and prerequisites.
  - The record explicitly answers whether Docker is supported, optional, or out of scope.
  - The chosen path identifies how Splunk Web, the app package, uvicorn, and required credentials are initialized.
  - The path is realistic for a judge starting from a clean checkout.
  feasibility: High as a focused spike. A host bootstrap path is likely the simplest default; Docker remains viable only if the judging environment permits it.
  points: 3
  dependencies: []
  origin_thought_ids:
  - BD-02
  recommendation: Do first
  status: Decided
  reviewer_notes: 'Decision record at docs/DEMO_RUNTIME.md. Two-tier runtime: Tier 1 = demo mode, no Splunk (default judge path, deterministic); Tier 2 = existing Splunk + bootstrap script (DEMO-002) for full/live mode. Docker explicitly out of scope. Credential policy: env-backed AGENT_MESH_API_KEY, SPLUNK_TOKEN intentionally unset (avoids the AUTH-001 coupling). Key Tier-2 risk to validate: restmap.conf python.required=3.13 vs the judge''s Splunk bundled Python.'

- order: 2
  story_id: AUTH-001
  theme: Authentication
  story: Separate runtime credential modes and remove silent token coupling
  description: Make the sidecar authentication model explicit. Today the presence of SPLUNK_TOKEN silently activates Splunk-backed settings storage and also affects conf reads. Keep delegated browser-session access for browser search polling, while defining a clear sidecar policy for app configuration and the LLM provider key.
  acceptance_criteria:
  - Credential mode is configured explicitly rather than inferred only from SPLUNK_TOKEN presence.
  - Browser search polling continues to use the analyst Splunk Web session through the __raw proxy.
  - The sidecar does not require the analyst browser token to read or store the LLM API key.
  - Startup logs identify the selected credential mode without printing secrets.
  - 401 and 403 failures are surfaced as authentication or authorization errors rather than generic 502 errors.
  feasibility: High. This addresses the current overloaded SPLUNK_TOKEN behavior and reduces demo fragility. For the POC, an env-backed sidecar API key is the cleanest default.
  points: 5
  dependencies:
  - DEMO-001
  origin_thought_ids:
  - BD-01
  - BD-02
  recommendation: Do early
  status: Done
  reviewer_notes: 'Implemented explicit AGENT_MESH_SETTINGS_STORE=dev|splunk and AGENT_MESH_CONF_SOURCE=file|splunk selectors, both defaulting to the POC-safe local mode. SPLUNK_TOKEN no longer silently selects settings storage or conf REST reads. Delegated browser-session polling remains unchanged; service-search fallback remains separately gated. Startup logging reports selected modes without secret values. Splunk Passwords API 401/403 responses are preserved at the sidecar API boundary. Covered by server/tests/test_auth_modes.py and documented in ADR-020.'

- order: 3
  story_id: DEMO-002
  theme: Judge Demo
  story: Add a one-command bootstrap and preflight for judges
  description: Provide a script for the supported demo runtime that builds or links the Splunk app, starts uvicorn, validates prerequisites, and prints the exact Splunk Web URL to open. Fail early with useful instructions when configuration is missing.
  acceptance_criteria:
  - A judge can run one documented command from a clean checkout.
  - The command validates required tools, ports, Splunk reachability, app linkage or installation, and required environment values.
  - The command starts uvicorn and reports a health-check result.
  - Failures identify the missing prerequisite and the corrective action.
  - The documentation includes shutdown and rerun instructions.
  feasibility: High after DEMO-001. The existing build/link tooling and uvicorn entry point provide most of the pieces.
  points: 8
  dependencies:
  - DEMO-001
  - AUTH-001
  origin_thought_ids:
  - BD-01
  - BD-02
  recommendation: Do early
  status: Done
  reviewer_notes: 'Implemented scripts/bootstrap.sh with modes demo (default, Tier 1 — uvicorn :8765 + standalone UI :8080, no Splunk/key), full (Tier 2 — build+link app, live LLM + delegated Splunk search), check (preflight only), stop. Preflight validates Node>=22/Yarn/Python>=3.11/curl, required ports, and (full) AGENT_MESH_API_KEY + SPLUNK_HOME + Splunk reachability; failures name the fix. Auto-creates the venv and installs deps on first run; starts uvicorn with SPLUNK_TOKEN unset + AGENT_MESH_SETTINGS_STORE=dev/CONF_SOURCE=file (AUTH-001/DEMO-001 policy); health-checks /api/v1/health and runs a demo smoke; Ctrl-C/stop cleanup via .bootstrap/ PID files. Docs in scripts/README.md + README quick start; .bootstrap/ gitignored. Verified: bash -n, --help, and check (correctly flagged the busy :8765 with corrective hint). Full end-to-end launch is a documented manual step (could not bind :8765 while another uvicorn was running).'

- order: 4
  story_id: DEMO-003
  theme: Judge Demo
  story: Harden the deterministic demo mode
  description: Turn the existing backend canned demo path into a judge-ready mode with deterministic events and chart artifacts that render without a live LLM call or unpredictable search data. Prefer the backend fixture as the authoritative source instead of relying on duplicated frontend fallback data.
  acceptance_criteria:
  - Demo mode can complete without an external LLM API call.
  - The demo produces a representative investigation timeline and at least one chart artifact with guaranteed rows.
  - The UI clearly labels the run as demo data.
  - A smoke test verifies start, SSE completion, and artifact rendering.
  - The authoritative fixture location is documented and duplicate fallback behavior is removed or explicitly justified.
  feasibility: High. A backend deterministic demo already exists; this story strengthens it and verifies the full path.
  points: 5
  dependencies:
  - DEMO-002
  origin_thought_ids:
  - BD-02
  recommendation: Do early
  status: Done
  reviewer_notes: 'Backend demo_case.py is now the single authoritative fixture (frontend demoData.ts/DEMO_RESULT removed). Scenario replaced (no jsmith) with a Log4Shell -> C2 investigation. When run via /start+SSE it is a paced replay: events stream and each search artifact goes pending->running->done with contextual phases, so it looks like a live LLM run; /run returns the same result instantly. Pacing via AGENT_MESH_DEMO_STEP_SECONDS (default 1.1, tests 0). UI shows a "Demo data" badge; button renamed to "Run Demo Investigation"; demo now uses the same /start path as live. Authoritative fixture + knob documented in docs/DEMO_RUNTIME.md. Smoke tests in server/tests/test_demo.py (no-LLM completion, progressive replay, start->completion->artifact via job store). Verified: pytest 34, jest 20, tsc + lint clean.'

- order: 5
  story_id: UI-001
  theme: Console UI
  story: Convert the investigation view into a full-bleed console shell
  description: Remove the Splunk Agentic Mesh page heading and use the available area directly beneath the Splunk ribbon. The investigation console should occupy the full page width and height, with scrolling constrained to the event stream instead of the outer document.
  acceptance_criteria:
  - The redundant page heading and tagline are removed.
  - The console fills the available viewport beneath the Splunk ribbon on a modern laptop screen.
  - The document body does not scroll during normal investigation use.
  - Only the event-stream area scrolls as events accumulate.
  - The layout is tested at laptop and 2K desktop viewport sizes and does not show two vertical scrollbars.
  feasibility: High. The current UI is already moving toward a viewport-based workbench; the remaining work is primarily shell layout and wrapper CSS.
  points: 5
  dependencies: []
  origin_thought_ids:
  - BD-04
  recommendation: Do next
  status: Done
  reviewer_notes: 'Implemented full-bleed console shell while keeping current tabs temporary for UI-002. Removed the redundant page heading/tagline, removed outer Splunk page margins, made the app shell measure and fill the available viewport below the Splunk chrome, converted InvestigationPage and InvestigationReport to flex-owned height, and constrained overflow so the transcript/event area is the normal scrolling surface. Kept layout independent from the tab implementation so Settings/About can move behind console-native controls in UI-002 without reworking the console height model. Verified with frontend Jest, TypeScript, lint, and stylelint.'

- order: 6
  story_id: UI-002
  theme: Console UI
  story: Replace top-level tabs with console-native controls
  description: Remove the Investigation, Settings, and About tabs from the main workspace. Keep investigation as the primary surface, expose settings through a gear control, and relocate About content to a secondary affordance.
  acceptance_criteria:
  - The primary page no longer renders the current top-level tab bar.
  - A visible gear control opens settings in a modal, drawer, or similarly contained surface.
  - Closing settings returns the analyst to the same investigation state.
  - About content remains reachable without consuming persistent workspace height.
  - Keyboard focus and close behavior work for the chosen overlay pattern.
  feasibility: High. Existing Settings and About components can be reused inside a modal or drawer.
  points: 5
  dependencies:
  - UI-001
  origin_thought_ids:
  - BD-04
  recommendation: Done
  status: Done
  reviewer_notes: 'Removed the top-level TabLayout from Investigations and made InvestigationPage the persistent primary console surface. Added absolute console controls with a visible Settings gear and About action. Settings and About now open in Splunk React UI Modal overlays with close button/Escape behavior and focus return, so they do not consume workspace height and do not unmount the running investigation. Tests cover absence of tab navigation, opening settings without losing the Start Investigation button, and Escape-close behavior. Verified with frontend Jest and TypeScript during implementation.'

- order: 7
  story_id: CFG-001
  theme: Configuration
  story: Make model configuration source-of-truth explicit
  description: Align the model shown in settings with the model the harness actually uses. The current agent configuration is driven by agents.conf, while the settings surface can imply a separate model choice. Decide whether the gear settings editor writes an app-local agents.conf override or presents the effective conf model read-only until write permissions are deliberately implemented.
  acceptance_criteria:
  - The UI displays the effective harness model from one authoritative source.
  - 'The selected policy is documented: editable conf override or read-only effective value.'
  - If editing is supported, writes use an app-local stanza override with clear RBAC and error handling.
  - A changed model is used by subsequent harness runs without requiring an undocumented manual edit.
  - The LLM API key remains separate from model selection.
  feasibility: Medium. Reading the effective value is straightforward. Writing Splunk configuration from the UI is feasible but needs an intentional authorization and reload policy.
  points: 8
  dependencies:
  - AUTH-001
  - UI-002
  origin_thought_ids:
  - BD-03
  recommendation: Do after auth policy
  status: Done
  reviewer_notes: 'Implemented read-only effective harness model visibility. /api/v1/settings now returns effective_model sourced from the same agents.conf reader used by the orchestrator, including primary agent id/name, conf source, read-only policy, and error state. Settings no longer presents the model as an editable provider setting; provider/base URL/API key remain separate. Connection tests use the effective harness model. Model edits are intentionally deferred until an app-local agents.conf override flow with RBAC/reload/audit behavior is designed. Policy documented in ADR-021 and DEMO_RUNTIME.md.'

- order: 8
  story_id: STATE-001
  theme: Durable Sessions
  story: Design the durable investigation record in Splunk KV Store
  description: Define the durable session model before implementing chat-style history. Capture investigation metadata, ownership, status, emitted events, artifact metadata, and revision behavior. Avoid storing secrets and avoid duplicating large preview-result row sets unless a specific retention requirement calls for it.
  acceptance_criteria:
  - A schema defines investigation ID, owner, timestamps, status, request, emitted events, artifact metadata, and version or revision fields.
  - The design names what is not stored, including secrets and transient preview rows.
  - Retention, per-user visibility, cancellation, and partial-run behavior are documented.
  - The design explains checkpoint timing after event emission and how concurrent updates are handled.
  - The required KV Store collection configuration is identified.
  feasibility: High as a design story. It is the required foundation for durable history and URL restoration.
  points: 5
  dependencies: []
  origin_thought_ids:
  - BD-05
  - BD-06
  - BD-07
  recommendation: Design before coding
  status: Done
  reviewer_notes: 'Design accepted in docs/DURABLE_INVESTIGATIONS.md and ADR-022. Defines one KV Store document per investigation in agent_mesh_investigations with _key=investigation_id, schema_version, owner, timestamps, 30-day expires_at, status/status_reason, request, summary, agent state, full validated emitted events, artifact metadata, audit entries, last_sequence, and record_revision. Explicitly excludes Splunk session tokens, LLM/API secrets, raw prompts, browser UI state, transient preview rows, and final search result rows; Splunk remains the source of truth for row data. Visibility policy is per-user only. Retention is 30 days via expires_at, with list/load APIs expected to filter expired records before physical cleanup exists. Cancellation, partial-run behavior, checkpoint timing, and optimistic concurrency/retry behavior are documented. Required collections.conf and transforms.conf stanzas are identified but not implemented until STATE-002.'

- order: 9
  story_id: STATE-002
  theme: Durable Sessions
  story: Persist investigation snapshots after meaningful event updates
  description: Replace the current process-only job state as the sole record of an investigation by checkpointing durable state to Splunk KV Store after each emitted event or meaningful artifact update. Keep the in-memory store as an execution cache where useful.
  acceptance_criteria:
  - A KV Store repository writes and reads investigation records using the schema from STATE-001.
  - A new investigation receives a durable GUID before streaming begins.
  - Each emitted event or artifact-state transition is checkpointed without blocking SSE delivery indefinitely.
  - Completed, failed, cancelled, and timed-out runs retain a final durable status.
  - Restarting uvicorn does not erase completed investigation history.
  - Persistence failures are logged and represented clearly without silently corrupting the active stream.
  feasibility: Medium-high but substantial. The current job store is process-local, so this is a cross-cutting backend change with error-handling and consistency decisions.
  points: 13
  dependencies:
  - STATE-001
  - AUTH-001
  origin_thought_ids:
  - BD-05
  - BD-06
  - BD-07
  recommendation: Implement incrementally
  status: Done
  reviewer_notes: 'Implemented Splunk KV Store checkpointing for durable investigation records. Added packages/agent-mesh default collections.conf/transforms.conf for agent_mesh_investigations. Added server/agent_mesh/durable_investigations.py with STATE-001 record projection, row/secret exclusion, 30-day expires_at, Splunk KV repository, restored job projection, and per-user durable read filtering. The global InvestigationJobStore checkpoints on create, meaningful updates, cancel, completion, and failure while keeping memory as the execution cache. Persistence failures are captured on the job as persistence_error and logged without breaking the active stream. Existing get/status endpoints read memory first and fall back to durable KV records when a Splunk session is available, allowing completed records to survive uvicorn restart by ID. Session list/load APIs remain scoped to STATE-003. Covered by server/tests/test_durable_investigations.py; full backend suite passes.'

- order: 10
  story_id: STATE-003
  theme: Durable Sessions
  story: Expose session list and load APIs with ownership checks
  description: "Add backend endpoints that allow the UI to list investigations and load a selected investigation from KV Store. Apply the selected POC ownership policy consistently so one analyst does not accidentally browse another analyst\u2019s session history."
  acceptance_criteria:
  - The API lists sessions in reverse chronological order with summary fields suitable for a sidebar.
  - The API loads one investigation by GUID.
  - The API enforces the documented ownership or visibility policy.
  - Missing, inaccessible, and malformed IDs return distinct useful errors.
  - API responses do not contain stored secrets or unnecessary search preview rows.
  feasibility: High once the durable repository exists.
  points: 5
  dependencies:
  - STATE-002
  origin_thought_ids:
  - BD-05
  - BD-07
  recommendation: Do after persistence
  status: Proposed
  reviewer_notes: ''

- order: 11
  story_id: UI-003
  theme: Console UI
  story: Add a collapsible investigation history sidebar
  description: Add a collapsed-by-default left-side session rail inspired by cloud consoles and chat history. It should preserve console workspace space while making prior investigations easy to find and reopen.
  acceptance_criteria:
  - A left-side control expands and collapses the session list.
  - The list is populated from the durable-session API and ordered by recent activity.
  - Each item shows a concise label, status, and useful timestamp.
  - Selecting a prior session restores its event timeline and artifacts.
  - The sidebar does not introduce outer-page scrolling or obscure the active console at supported viewport sizes.
  feasibility: High after STATE-003. The main complexity is restoring artifacts and preserving the full-bleed layout.
  points: 8
  dependencies:
  - UI-001
  - STATE-003
  origin_thought_ids:
  - BD-05
  recommendation: Do after persistence API
  status: Proposed
  reviewer_notes: ''

- order: 12
  story_id: STATE-004
  theme: Durable Sessions
  story: Make investigations URL-addressable
  description: Reflect the selected durable investigation in the Splunk page URL using a query parameter such as Investigations?id=<investigation-guid>. On page load, restore the matching session through the durable-session API.
  acceptance_criteria:
  - Starting or selecting an investigation updates the URL query parameter.
  - Loading a URL with a valid id restores the corresponding session.
  - Browser back and forward navigation select the expected session.
  - Invalid, missing, and inaccessible IDs show a useful state without breaking the console.
  - The implementation works within the Splunk app page routing model.
  feasibility: High after STATE-003. A query parameter is likely simpler and more compatible with the Splunk page wrapper than a new route.
  points: 5
  dependencies:
  - STATE-003
  origin_thought_ids:
  - BD-07
  recommendation: Do after persistence API
  status: Proposed
  reviewer_notes: ''

- order: 13
  story_id: REL-001
  theme: Reliability
  story: Define stream resume behavior for restored sessions
  description: Clarify what happens when an analyst refreshes or reopens a still-running investigation. The current streaming and token state is process-oriented; durable sessions need an explicit policy for reconnecting to active work and displaying the last durable checkpoint.
  acceptance_criteria:
  - The UI distinguishes a restored completed session from a restored active or interrupted session.
  - Refreshing a running investigation either reconnects to its stream or clearly shows the last durable checkpoint and recovery limitation.
  - Stream signing secret behavior is documented for uvicorn restarts.
  - The chosen POC limitation or implementation is covered by a test.
  feasibility: Medium. This can begin as an explicit limitation, but it should not remain ambiguous once durable sessions are visible in the UI.
  points: 5
  dependencies:
  - STATE-002
  - STATE-004
  origin_thought_ids:
  - BD-06
  - BD-07
  recommendation: Define before polish
  status: Proposed
  reviewer_notes: ''
- order: 14
  story_id: DOC-001
  theme: Documentation
  story: Update setup documentation to match the selected auth and demo paths
  description: Remove ambiguity from setup instructions after the auth and judge-demo decisions. Explain delegated browser-session search polling separately from uvicorn configuration and LLM credential handling.
  acceptance_criteria:
  - Documentation names each credential, its purpose, and where it is supplied.
  - Documentation distinguishes browser-to-Splunk __raw search polling from uvicorn-side actions.
  - The one-command demo path is the primary quick start.
  - Known POC security limitations are stated directly.
  - A fresh-checkout walkthrough has been exercised successfully.
  feasibility: High. This should land with the implementation work rather than remain a follow-up note.
  points: 3
  dependencies:
  - AUTH-001
  - DEMO-002
  - DEMO-003
  origin_thought_ids:
  - BD-01
  - BD-02
  recommendation: Ship with demo path
  status: Proposed
  reviewer_notes: ''
